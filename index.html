<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GS 創世紀國際投資股份有限公司 · Genesis International Capital</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>

<style>
  :root {
    --bg: #070707;
    --bg-2: #0d0d0d;
    --bg-3: #141414;
    --ink: #efe6d2;
    --ink-dim: #9a907a;
    --ink-mute: #5c5446;
    --line: rgba(212, 175, 55, 0.18);
    --line-soft: rgba(239, 230, 210, 0.08);
    --gold: #D4AF37;
    --gold-hi: #F4D03F;
    --gold-lo: #8B6914;
    --gold-glow: rgba(212, 175, 55, 0.35);
    --serif: "Noto Serif TC", "Cormorant Garamond", "Songti TC", serif;
    --serif-en: "Cormorant Garamond", "Noto Serif TC", serif;
    --sans: "Inter", "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
    --sans-zh: "Noto Sans TC", "Inter", sans-serif;
    /* Shared left rail = the centered 1440px container's content edge at every width */
    --rail-x: max(64px, calc((100vw - 1440px) / 2 + 64px));
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans-zh); -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; }

  /* Subtle film grain overlay */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: overlay; opacity: 0.4;
    z-index: 9999;
  }

  /* Smooth scroll */
  html { scroll-behavior: smooth; }

  /* Selection */
  ::selection { background: var(--gold); color: #000; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,0.4); }

  /* Loading shimmer for placeholders */
  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }

  @keyframes goldShine {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Gold gradient text */
  .gold-text {
    background: linear-gradient(135deg, var(--gold-lo) 0%, var(--gold-hi) 35%, var(--gold) 50%, var(--gold-hi) 65%, var(--gold-lo) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: goldShine 8s ease-in-out infinite;
  }

  .gold-line {
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
    height: 1px;
  }

  /* Section reveal */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 1.2s cubic-bezier(.16,.84,.3,1), transform 1.2s cubic-bezier(.16,.84,.3,1);
  }
  .reveal.in {
    opacity: 1;
    transform: translateY(0);
  }

  /* Three.js persistent background layer — full viewport, behind everything */
  #three-bg {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  /* 3D background fades in only once the (async) Three.js scene is ready */
  #three-bg.three-on { opacity: 1; }
  /* Readability scrim that sits between the 3D bg and the page content.
     Darkens behind text; its character changes per page via body[data-page]. */
  #bg-scrim {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    transition: background 1s cubic-bezier(.7,0,.2,1), opacity 1s ease;
    /* hero default: dark on the left (text side), clear on the right (object) */
    background:
      linear-gradient(90deg,
        rgba(7,7,7,0.94) 0%,
        rgba(7,7,7,0.82) 30%,
        rgba(7,7,7,0.35) 58%,
        rgba(7,7,7,0.05) 82%,
        rgba(7,7,7,0) 100%);
  }
  /* Content pages: more even, heavier scrim so the dimmed object reads as
     ambient background and copy stays legible. */
  body[data-page="content"] #bg-scrim {
    background:
      radial-gradient(120% 90% at 78% 45%, rgba(7,7,7,0.55) 0%, rgba(7,7,7,0.9) 60%, rgba(7,7,7,0.96) 100%);
  }
  /* <=1024px: the hero grid collapses to one column but the dodecahedron keeps
     its full-brightness right-of-center position — deepen the right side of the
     hero scrim so the gold title never competes gold-on-gold with the object. */
  @media (max-width: 1024px) {
    #bg-scrim {
      background:
        linear-gradient(90deg,
          rgba(7,7,7,0.94) 0%,
          rgba(7,7,7,0.88) 45%,
          rgba(7,7,7,0.74) 100%);
    }
  }

  /* Reusable */
  .container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 64px;
  }
  @media (max-width: 768px) {
    .container { padding: 0 24px; }
  }

  .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before {
    content: "";
    display: inline-block;
    width: 32px;
    height: 1px;
    background: var(--gold);
  }

  h1, h2, h3, h4 {
    font-family: var(--serif);
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  .display {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(48px, 7vw, 104px);
    line-height: 1.02;
    letter-spacing: -0.02em;
  }

  .display-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 400;
  }

  .lead {
    font-size: 17px;
    line-height: 1.7;
    color: var(--ink-dim);
    max-width: 56ch;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 16px 28px;
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: 500;
    border: 1px solid var(--gold);
    color: var(--gold);
    background: transparent;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(.16,.84,.3,1);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold-lo), var(--gold), var(--gold-hi));
    transform: translateY(101%);
    transition: transform 0.5s cubic-bezier(.16,.84,.3,1);
    z-index: -1;
  }
  .btn:hover { color: #000; border-color: var(--gold-hi); }
  .btn:hover::before { transform: translateY(0); }
  .btn .arrow { transition: transform 0.4s; }
  .btn:hover .arrow { transform: translateX(4px); }

  .btn-solid {
    background: linear-gradient(135deg, var(--gold-lo), var(--gold), var(--gold-hi));
    color: #0a0a0a;
    border: 1px solid var(--gold);
  }
  .btn-solid::before { display: none; }
  .btn-solid:hover { transform: translateY(-2px); box-shadow: 0 12px 32px -8px var(--gold-glow); }

  /* Asset slot */
  .asset-slot {
    position: relative;
    background: repeating-linear-gradient(
      45deg,
      rgba(212,175,55,0.04),
      rgba(212,175,55,0.04) 8px,
      rgba(212,175,55,0.08) 8px,
      rgba(212,175,55,0.08) 16px
    );
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-mute);
    font-family: "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Nav */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 22px var(--rail-x);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.4s ease;
    background: linear-gradient(180deg, rgba(7,7,7,0.85) 0%, rgba(7,7,7,0) 100%);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .nav.scrolled {
    padding: 14px var(--rail-x);
    background: rgba(7,7,7,0.92);
    border-bottom: 1px solid var(--line);
  }
  @media (max-width: 768px) {
    .nav, .nav.scrolled { padding-left: 24px; padding-right: 24px; }
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--ink);
  }
  .nav-logo-mark {
    width: 38px; height: 38px;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-weight: 700;
    color: var(--gold);
    font-size: 15px;
    letter-spacing: 0.02em;
    position: relative;
  }
  .nav-logo-mark::before, .nav-logo-mark::after {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    border: 1px solid var(--gold);
  }
  .nav-logo-mark::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
  .nav-logo-mark::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }

  .nav-logo-text {
    display: flex; flex-direction: column;
    line-height: 1.2;
  }
  .nav-logo-text .zh { font-family: var(--serif); font-size: 14px; font-weight: 500; letter-spacing: 0.08em; }
  .nav-logo-text .en { font-family: var(--sans); font-size: 9px; letter-spacing: 0.32em; color: var(--ink-dim); text-transform: uppercase; }

  .nav-links {
    display: flex; align-items: center; gap: 36px;
  }
  .nav-link {
    font-family: var(--sans-zh);
    font-size: 13px;
    color: var(--ink-dim);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.3s;
    position: relative;
    padding: 8px 0;
    cursor: pointer;
    background: none; border: none;
  }
  .nav-link:hover { color: var(--gold); }
  .nav-link.active { color: var(--gold); }
  .nav-link.active::after {
    content: ""; position: absolute; bottom: 0; left: 0; right: 0;
    height: 1px; background: var(--gold);
  }

  .lang-toggle {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--line);
    padding: 4px;
    border-radius: 999px;
  }
  .lang-btn {
    background: none; border: none;
    color: var(--ink-mute);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.15em;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .lang-btn.active {
    color: #0a0a0a;
    background: linear-gradient(135deg, var(--gold-lo), var(--gold), var(--gold-hi));
  }
  .lang-btn:not(.active):hover { color: var(--gold); }

  /* Mobile menu hamburger */
  .nav-burger {
    display: none;
    background: none; border: none;
    width: 32px; height: 32px;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
  }
  .nav-burger span { display: block; height: 1px; background: var(--gold); transition: all 0.3s; }
  .nav-burger span:nth-child(1) { width: 22px; }
  .nav-burger span:nth-child(2) { width: 14px; }
  .nav-burger span:nth-child(3) { width: 22px; }

  @media (max-width: 1024px) {
    .nav-links .nav-link:not(.lang-keep) { display: none; }
    .nav-burger { display: flex; }
  }

  /* Hero */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    padding-top: 120px;
    padding-bottom: 80px;
  }
  .hero-bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, var(--line-soft) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse at center, black 0%, transparent 80%);
    pointer-events: none;
    opacity: 0.6;
  }
  .hero-inner {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 60px;
    align-items: center;
    width: 100%;
  }
  @media (max-width: 1024px) {
    .hero-inner { grid-template-columns: 1fr; }
    .hero-3d-col { display: none; }
  }
  .hero-3d-col {
    position: relative;
    /* Reserves WIDTH for the fixed-canvas object; capped so an invisible
       spacer can never push the hero past the viewport on short screens. */
    height: min(640px, calc(100vh - 320px));
  }

  .hero-meta {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .hero-title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(54px, 7.2vw, 108px);
    line-height: 1.06;
    letter-spacing: -0.025em;
  }
  .hero-title .row { display: block; }
  .hero-title .row.gold {
    background: linear-gradient(135deg, var(--gold-lo) 0%, var(--gold-hi) 40%, var(--gold) 55%, var(--gold-hi) 70%, var(--gold-lo) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: goldShine 10s ease-in-out infinite;
  }
  /* EN locale: Latin strings are ~3x wider per glyph than the 6-char CJK lockup —
     scale down so the two-row structure survives the language toggle.
     (Hook already exists: the locale effect sets document.documentElement.lang.) */
  html[lang="en"] .hero-title {
    /* "Compounding Across" measures 10.15em; the text column is ~0.52vw-98px
       between 1025-1568px viewports — 3.9vw keeps both rows single-line. */
    font-size: clamp(40px, 3.9vw, 62px);
  }
  html[lang="en"] .hero-title .row {
    text-wrap: balance;
  }
  .hero-en {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: clamp(20px, 2vw, 28px);
    color: var(--ink-dim);
    margin-top: 24px;
    letter-spacing: 0.02em;
    font-weight: 400;
  }
  .hero-sub {
    max-width: 48ch;
    color: var(--ink-dim);
    font-size: 16px;
    line-height: 1.85;
    margin-top: 8px;   /* 24px gap + 8 = 32px break before body copy */
    text-wrap: pretty; /* no 1-3 character orphan line above the CTAs */
  }
  .hero-cta {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 16px;  /* 24px gap + 16 = 40px before the action zone */
  }
  /* Narrow Android widths: keep the 6-character two-row lockup intact */
  @media (max-width: 400px) {
    .hero-title { font-size: clamp(42px, 14vw, 54px); }
  }

  /* Ticker bar bottom of hero */
  .hero-ticker {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    border-top: 1px solid var(--line);
    background: transparent;
    /* left inset = rail + 106px so item 1 starts 45px clear of the 01/07 counter */
    padding: 14px var(--rail-x) 14px calc(var(--rail-x) + 106px);
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    z-index: 10;
    overflow: hidden;
  }
  .hero-ticker-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .hero-ticker-item .dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }
  /* Progressive disclosure: whole items, never mid-word clipping */
  @media (max-width: 1200px) { .hero-ticker .hero-ticker-item:nth-child(4) { display: none; } }
  @media (max-width: 920px)  { .hero-ticker .hero-ticker-item:nth-child(3) { display: none; } }
  @media (max-width: 768px) { .hero-ticker { display: none; } }

  /* Scroll cue */
  .scroll-cue {
    position: absolute;
    left: 50%;
    bottom: 64px;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-mute);
    z-index: 10;
    writing-mode: vertical-rl;
  }
  @media (max-width: 1024px) { .scroll-cue { display: none; } }
  .scroll-cue .line {
    width: 1px; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--gold));
    animation: scrollLine 2.4s ease-in-out infinite;
    writing-mode: horizontal-tb;
  }
  @keyframes scrollLine {
    0% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform-origin: bottom; }
    100% { transform: scaleY(0); transform-origin: bottom; }
  }

  /* Sections */
  section.section { padding: 140px 0; position: relative; }
  @media (max-width: 768px) { section.section { padding: 100px 0; } }

  .section-head {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 80px;
    margin-bottom: 80px;
    align-items: end;
  }
  @media (max-width: 1024px) { .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 56px; } }

  .section-title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(40px, 4.5vw, 64px);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .section-title .em {
    font-family: var(--serif-en);
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }
  .section-num {
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 500;
  }

  /* About section */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  @media (max-width: 1024px) { .about-grid { grid-template-columns: 1fr; gap: 48px; } }

  .about-visual {
    position: relative;
    aspect-ratio: 4/5;
    border: 1px solid var(--line);
    overflow: hidden;
  }

  /* Brand plaque — replaces the photography placeholder with a pure-CSS
     monogram panel that matches the intro mark / nav logo language. */
  .brand-plaque {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(80% 60% at 50% 38%, rgba(212,175,55,0.10) 0%, transparent 70%),
      linear-gradient(180deg, var(--bg-3) 0%, var(--bg) 100%);
  }
  .brand-plaque .bp-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, var(--line-soft) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 0%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 0%, transparent 75%);
  }
  .bp-inner {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
    text-align: center;
    padding: 32px;
  }
  .bp-eyebrow {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--ink-mute);
    text-transform: uppercase;
    padding-left: 0.42em;
  }
  .bp-mark {
    width: 110px; height: 110px;
    border: 1px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 700;
    position: relative;
    background: linear-gradient(135deg, var(--gold-lo) 0%, var(--gold-hi) 40%, var(--gold) 55%, var(--gold-hi) 70%, var(--gold-lo) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: goldShine 8s ease-in-out infinite;
  }
  .bp-mark::before, .bp-mark::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--gold);
  }
  .bp-mark::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
  .bp-mark::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }
  .bp-line {
    width: 160px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .bp-zh {
    font-family: var(--serif);
    font-size: 24px;
    letter-spacing: 0.3em;
    padding-left: 0.3em;
    color: var(--ink);
  }
  .bp-tags {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 0.12em;
  }
  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    margin-top: 56px;
    border: 1px solid var(--line);
  }
  .about-stat {
    background: var(--bg);
    padding: 32px 28px;
  }
  .about-stat .num {
    font-family: var(--serif-en);
    font-weight: 400;
    font-size: 56px;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold-lo), var(--gold-hi), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px;
  }
  .about-stat .num .unit {
    font-family: var(--sans);
    font-size: 16px;
    letter-spacing: 0.1em;
    background: none;
    -webkit-text-fill-color: var(--gold);
    margin-left: 4px;
    font-weight: 400;
  }
  .about-stat .label {
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
  }

  /* Services */
  .services-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  @media (max-width: 768px) { .services-grid { grid-template-columns: 1fr; } }

  .service-card {
    background: var(--bg);
    padding: 48px 40px;
    position: relative;
    transition: background 0.5s;
    cursor: pointer;
    min-height: 320px;
    display: flex;
    flex-direction: column;
  }
  .service-card:hover {
    background: linear-gradient(180deg, rgba(212,175,55,0.04) 0%, var(--bg) 100%);
  }
  .service-card .num {
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--gold);
    font-size: 18px;
    margin-bottom: 32px;
  }
  .service-card h3 {
    font-size: 26px;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .service-card .en {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 24px;
    font-weight: 400;
  }
  .service-card p {
    color: var(--ink-dim);

    font-size: 14px;

  }
  .service-card .arrow-bottom {

  .service-card:hover .arrow-bottom { opacity: 1; transform: translateX(0); }

  /* Philosophy */
  .philosophy {
    background: transparent;
    position: relative;
    overflow: hidden;
  }
  .philosophy::before {
    content: "";
    position: absolute;
    width: 800px; height: 800px;
    left: -200px; top: -200px;

  }
  .philosophy-quote {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 72px);

  .philosophy-quote .em {

    font-style: italic;

  }
  .philosophy-pillars {

  .pillar {
    background: var(--bg);

    text-align: center;

  .pillar canvas { width: 100%; height: 140px; display: block; }
  .pillar h4 {

  .pillar .en {
    font-family: var(--serif-en);

    margin-bottom: 18px;

  .pillar p {
    color: var(--ink-dim);

  /* Team */

  @media (max-width: 1024px) { .team-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px) { .team-grid { grid-template-columns: 1fr; } }

  .team-card {
    position: relative;
  }
  .team-photo {

  .team-photo::after {

  .team-card h4 {
    font-size: 19px;

  }
  .team-card .role {

    font-style: italic;

  .team-card .bio {

  /* Team — unified, image-free roster (no cards) */
  .team-list {
    border-top: 1px solid var(--line);

  }
  .team-row {
    display: grid;
    grid-template-columns: 92px 1fr 1.7fr;
    gap: 44px;

  .team-row:hover {

  }
  .team-row .idx {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 42px;

    color: var(--gold);

  .team-row .dept h4 {

  .team-row .dept .role {

    font-style: italic;

  .team-row .bio {

    .team-row .idx { grid-column: 1; grid-row: 1; font-size: 32px; }
    .team-row .dept { grid-column: 2; grid-row: 1; }
    .team-row .bio { grid-column: 2; grid-row: 2; }

  /* Our Space — two-image showcase */
  .space-grid {
    display: grid;
    grid-template-columns: 0.82fr 1.18fr;
    gap: 28px;
    height: min(60vh, 540px);
  }
  .space-fig {
    position: relative;
    margin: 0;
    height: 100%;
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .space-fig::after {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(212,175,55,0.18);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s;

  .space-fig:hover::after { opacity: 1; }
  .space-img {
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 1.4s cubic-bezier(.16,.84,.3,1);
  }
  .space-fig:hover .space-img { transform: scale(1.06); }
  .space-cap {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 32px 28px 26px;
    display: flex;
    flex-direction: column;

  .space-cap .lbl {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;

  .space-cap .ttl {
    font-family: var(--serif);
    font-size: 23px;
    color: var(--ink);

  }
  .space-cap .dsc {
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.65;

  }
  @media (max-width: 768px) {
    .space-grid { grid-template-columns: 1fr; height: auto; gap: 20px; }
    .space-fig { height: auto; aspect-ratio: 4 / 3; }
    .space-fig:first-child { aspect-ratio: 3 / 4; }

  /* Milestones */
  .milestones {
    background: transparent;
  }
  .timeline {
    position: relative;
    padding-left: 0;
  }
  .timeline-line {
    position: absolute;
    left: 140px;
    top: 12px; bottom: 12px;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--gold) 10%, var(--gold) 90%, transparent);
  }
  @media (max-width: 768px) { .timeline-line { left: 80px; } }

  .milestone {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 60px;
    padding: 32px 0;
    position: relative;
    align-items: start;
  }
  @media (max-width: 768px) { .milestone { grid-template-columns: 80px 1fr; gap: 32px; } }

  .milestone .year {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 44px;
    color: var(--gold);
    font-weight: 400;
    line-height: 1;
  }
  .milestone .dot {
    position: absolute;
    left: 134px;
    top: 18px;
    width: 13px; height: 13px;
    background: var(--bg-2);
    border: 1px solid var(--gold);
    border-radius: 50%;
  }
  .milestone .dot::after {
    content: "";
    position: absolute;
    inset: 3px;
    background: var(--gold);
    border-radius: 50%;
  }
  @media (max-width: 768px) { .milestone .dot { left: 74px; } }

  .milestone .body {
    padding-left: 50px;
  }
  @media (max-width: 768px) { .milestone .body { padding-left: 32px; } }
  .milestone h4 {
    font-size: 22px;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .milestone p {
    color: var(--ink-dim);
    font-size: 14px;
    line-height: 1.75;
    max-width: 56ch;
  }

  /* Contact */
  .contact {
    border-top: 1px solid var(--line);
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  @media (max-width: 1024px) { .contact-grid { grid-template-columns: 1fr; gap: 56px; } }
  /* Form removed — the info block becomes the sole, wider focal element */
  .contact-grid-solo { grid-template-columns: 1fr; max-width: 760px; }

  .contact-form { display: flex; flex-direction: column; gap: 22px; }
  .contact-row { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 540px) { .contact-row { grid-template-columns: 1fr; } }

  .field {
    display: flex; flex-direction: column;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    transition: border-color 0.3s;
  }
  .field:focus-within { border-color: var(--gold); }
  .field label {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 8px;
  }
  .field input, .field textarea, .field select {
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: var(--sans-zh);
    font-size: 15px;
    outline: none;
    padding: 4px 0;
    resize: vertical;
  }
  .field select option { background: var(--bg-2); }

  .contact-info-block {
    display: flex; flex-direction: column;
    gap: 28px;
    padding: 40px;
    border: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(212,175,55,0.03), transparent);
  }
  .contact-info-block .row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 16px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line-soft);
  }
  .contact-info-block .row:last-child { border-bottom: none; padding-bottom: 0; }
  .contact-info-block .label {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    padding-top: 4px;
  }
  .contact-info-block .val {
    font-family: var(--sans-zh);
    font-size: 14px;
    color: var(--ink);
    line-height: 1.7;
  }
  .contact-info-block .val a { color: var(--ink); text-decoration: none; transition: color 0.3s; }
  .contact-info-block .val a:hover { color: var(--gold); }

  /* Footer */
  .footer {
    border-top: 1px solid var(--line);
    padding: 64px 0 32px;
    background: var(--bg);
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 48px;
  }
  @media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr 1fr; } }

  .footer h5 {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    font-weight: 500;
  }
  .footer ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .footer a {
    color: var(--ink-dim);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.3s;
  }
  .footer a:hover { color: var(--gold); }
  .footer-bottom {
    border-top: 1px solid var(--line-soft);
    padding-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }
  @media (max-width: 768px) { .footer-bottom { flex-direction: column; gap: 12px; } }

  /* Disclaimer banner */
  .disclaimer {
    background: var(--bg-3);
    border-top: 1px solid var(--line-soft);
    padding: 24px 0;
    font-size: 11px;
    line-height: 1.7;
    color: var(--ink-mute);
    letter-spacing: 0.02em;
  }

  /* ════════════════════════════════════════════════════════
     PAGED MODE — full-screen pages with transitions
     ════════════════════════════════════════════════════════ */

  html, body { height: 100%; }
  body { overflow: hidden; }

  .page-shell {
    position: fixed;
    inset: 0;
    overflow: hidden;
    perspective: 1600px;
    z-index: 2;
    background: transparent;
  }

  .page {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    background: transparent;
  }
  .page.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }

  /* Override section padding for paged mode — each page handles its own layout */
  .page section.section {
    padding: 120px 0 80px;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .page section.section.contact {
    padding-bottom: 40px;
  }
  .page footer.footer {
    padding-top: 0;
  }

  /* When a page is the contact page we put the footer compactly inside it */
  .contact-footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.05em;
  }
  @media (max-width: 768px) { .contact-footer { flex-direction: column; gap: 12px; text-align: center; } }

  /* ─── Inner reveal — only on first load ─────────────── */
  .page-in > * { opacity: 1; transform: none; }
  body.first-load .page-in > * {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 1s cubic-bezier(.16,.84,.3,1), transform 1s cubic-bezier(.16,.84,.3,1);
  }
  body.first-load .page.active .page-in > * { opacity: 1; transform: translateY(0); }
  body.first-load .page.active .page-in > *:nth-child(1) { transition-delay: 0.05s; }
  body.first-load .page.active .page-in > *:nth-child(2) { transition-delay: 0.18s; }
  body.first-load .page.active .page-in > *:nth-child(3) { transition-delay: 0.32s; }
  body.first-load .page.active .page-in > *:nth-child(4) { transition-delay: 0.46s; }
  body.first-load .page.active .page-in > *:nth-child(5) { transition-delay: 0.6s; }
  body.first-load .page.active .page-in > *:nth-child(6) { transition-delay: 0.74s; }
  body.first-load .page.active .page-in > *:nth-child(7) { transition-delay: 0.88s; }
  body.first-load .page.active .page-in > *:nth-child(8) { transition-delay: 1.0s; }

  /* ════════════════════════════════════════════════════════
     INTRO — first-load curtain animation
     ════════════════════════════════════════════════════════ */

  .intro {
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    overflow: hidden;
  }
  .intro::before {
    content: "";
    position: absolute;
    width: 1200px; height: 1200px;
    background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 55%);
    opacity: 0;
    animation: introGlow 2.6s ease-out forwards;
  }
  @keyframes introGlow {
    0%, 100% { opacity: 0; transform: scale(0.6); }
    50% { opacity: 1; transform: scale(1); }
  }

  .intro-stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    opacity: 0;
    animation: introStage 2.6s cubic-bezier(.7,0,.2,1) forwards;
  }
  @keyframes introStage {
    0% { opacity: 0; transform: translateY(20px); }
    16% { opacity: 1; transform: translateY(0); }
    78% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-10px); }
  }

  .intro-mark {
    width: 96px; height: 96px;
    border: 1px solid var(--gold);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-family: var(--serif);
    font-weight: 700;
    font-size: 36px;
    letter-spacing: 0.02em;
    opacity: 0;
    transform: scale(0.6) rotate(-8deg);
    animation: introMark 1.2s cubic-bezier(.16,.84,.3,1) 0.05s forwards;
  }
  @keyframes introMark {
    0% { opacity: 0; transform: scale(0.6) rotate(-8deg); }
    60% { opacity: 1; transform: scale(1.05) rotate(0); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .intro-mark::before, .intro-mark::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--gold);
    opacity: 0;
    animation: introCorner 0.5s ease-out 0.7s forwards;
  }
  .intro-mark::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
  .intro-mark::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }
  @keyframes introCorner { from { opacity: 0; } to { opacity: 1; } }

  .intro-line {
    height: 1px;
    width: 0;
    background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
    animation: introLine 0.9s cubic-bezier(.7,0,.2,1) 0.6s forwards;
  }
  @keyframes introLine {
    from { width: 0; }
    to { width: 280px; }
  }

  .intro-title {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    opacity: 0;
    animation: introTitle 0.9s ease-out 0.85s forwards;
  }
  @keyframes introTitle { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .intro-title .zh {
    font-family: var(--serif);
    font-size: 22px;
    letter-spacing: 0.32em;
    color: var(--ink);
    padding-left: 0.32em;
  }
  .intro-title .en {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--gold);
    padding-left: 0.5em;
  }

  .intro-counter {
    position: absolute;
    bottom: 40px;
    right: 64px;
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: introCounter 2.2s ease-out 0.1s forwards;
  }
  @keyframes introCounter { 0% { opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { opacity: 0; } }
  .intro-counter::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    margin-right: 12px;
    transform: translateY(-2px);
    animation: introPulse 1s ease-in-out infinite;
  }
  @keyframes introPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .intro-bars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .intro-bars span {
    position: absolute;
    left: 0; right: 0;
    height: 50%;
    background: #050505;
    transition: transform 1.1s cubic-bezier(.86, 0, .07, 1);
  }
  .intro-bars span:first-child { top: 0; }
  .intro-bars span:last-child { bottom: 0; }
  .intro.lift .intro-bars span:first-child { transform: translateY(-101%); }
  .intro.lift .intro-bars span:last-child { transform: translateY(101%); }

  .intro.done {
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease-out;
  }

  /* ─── Side page nav (right rail) ────────────────────── */
  .pager {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 60;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 16px 6px;
  }
  .pager-btn {
    position: relative;
    width: 36px;
    height: 1px;
    border: none;
    background: rgba(239, 230, 210, 0.25);
    cursor: pointer;
    padding: 0;
    transition: all 0.5s cubic-bezier(.7,0,.2,1);
  }
  .pager-btn:hover { background: var(--gold); width: 48px; }
  .pager-btn.active {
    width: 56px;
    height: 1px;
    background: linear-gradient(90deg, var(--gold-lo), var(--gold-hi), var(--gold));
    box-shadow: 0 0 8px var(--gold-glow);
  }
  .pager-btn .pager-label {
    position: absolute;
    right: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .pager-btn:hover .pager-label,
  .pager-btn.active .pager-label { opacity: 1; }
  .pager-btn .pager-num {
    position: absolute;
    right: calc(100% + 14px);
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-mute);
    opacity: 1;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .pager-btn:hover .pager-num,
  .pager-btn.active .pager-num { opacity: 0; }
  @media (max-width: 768px) { .pager { right: 14px; gap: 10px; } .pager-btn { width: 18px; } .pager-btn.active { width: 28px; } .pager-label, .pager-num { display: none; } }

  /* ─── Bottom-left page counter ──────────────────────── */
  .page-counter {
    position: fixed;
    bottom: 12px;
    left: var(--rail-x);
    z-index: 60;
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-family: var(--serif-en);
    font-style: italic;
    color: var(--ink-dim);
    pointer-events: none;
  }
  .page-counter .cur {
    font-size: 36px;
    color: var(--gold);
    line-height: 1;
    min-width: 0.85em;
    display: inline-block;
    transition: transform 0.5s cubic-bezier(.7,0,.2,1);
  }
  .page-counter .slash {
    font-size: 16px;
    color: var(--ink-mute);
  }
  .page-counter .tot {
    font-size: 14px;
    color: var(--ink-mute);
  }
  @media (max-width: 768px) { .page-counter { left: 24px; bottom: 18px; } .page-counter .cur { font-size: 26px; } }

  /* ─── Nav adjustments for paged mode ─────────────────── */
  .nav { background: linear-gradient(180deg, rgba(7,7,7,0.9) 0%, rgba(7,7,7,0.6) 70%, transparent 100%); border-bottom: 1px solid var(--line-soft); }

  /* ─── Hero adjustments for paged ─────────────────────── */
  /* Full-screen contract: .page is absolutely positioned with inset:0 (definite
     height), so 100% makes the hero exactly viewport-tall — the ticker pins to
     the true bottom and the base .hero align-items:center finally engages.
     108/88 balances visible clear space around the chrome: ~41px below the
     67px nav vs ~43px above the 45px ticker band. */
  .page .hero {
    min-height: 100%;
    padding-top: 108px;
    padding-bottom: 88px;
  }
  /* Short laptops (incl. 1366×768): compact only the elastic parts so the
     full-height hero never scrolls internally. */
  @media (min-width: 769px) and (max-height: 800px) {
    .page .hero { padding-top: 92px; }
    .hero-meta { gap: 20px; }
    .hero-title { font-size: clamp(54px, 6.4vw, 88px); }
    .hero-cta { margin-top: 12px; }
    .hero-cta .btn { padding: 14px 24px; }
  }

  /* ─── Compact stat grid in About page ────────────────── */
  .page .about-grid { gap: 56px; align-items: center; }
  .page .about-visual { aspect-ratio: 4/4.2; }

  /* ─── Horizontal milestones for paged mode ──────────── */
  .timeline-h {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    position: relative;
    margin-top: 40px;
    gap: 0;
  }
  @media (max-width: 1024px) { .timeline-h { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) { .timeline-h { grid-template-columns: repeat(2, 1fr); } }

  .timeline-h::before {
    content: "";
    position: absolute;
    top: 32px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold) 8%, var(--gold) 92%, transparent);
  }
  .ms-h {
    position: relative;
    padding: 0 20px;
    text-align: left;
  }
  .ms-h .yr {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 12px;
  }
  .ms-h .ms-dot {
    position: absolute;
    top: 27px;
    left: 20px;
    width: 11px; height: 11px;
    background: var(--bg-2);
    border: 1px solid var(--gold);
    border-radius: 50%;
  }
  .ms-h .ms-dot::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: var(--gold);
    border-radius: 50%;
  }
  .ms-h .ms-body { padding-top: 36px; }
  .ms-h h4 { font-size: 17px; margin-bottom: 8px; line-height: 1.35; }
  .ms-h p { font-size: 12px; line-height: 1.65; color: var(--ink-dim); }

  /* Inner reveal handled above in INTRO block — first-load only */

  /* Allow scroll within long pages without nav happening */
  .page::-webkit-scrollbar { width: 4px; }
  .page::-webkit-scrollbar-track { background: transparent; }
  .page::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); }

  /* ─── Instant boot splash (pre-React) ───────────────── */
  #boot-splash {
    position: fixed;
    inset: 0;
    z-index: 9500;
    background: #050505;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity 0.5s ease;
  }
  #boot-splash.hide { opacity: 0; }
  #boot-splash .bm {
    width: 96px; height: 96px;
    border: 1px solid #D4AF37;
    display: flex; align-items: center; justify-content: center;
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 36px;
    color: #D4AF37;
    letter-spacing: 0.02em;
    animation: bootPulse 1.6s ease-in-out infinite;
  }
  #boot-splash .bt {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #8B6914;
    padding-left: 0.5em;
  }
  @keyframes bootPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
</head>

  <div class="bt">Loading</div>

<script defer crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<!-- Three.js r128 UMD (exposes global THREE) — loaded async so it never blocks
     first paint. ThreeHero waits for the 'threeready' signal, then fades the
     3D scene in; the static page is fully usable before 3D arrives. -->
<script>window.__threeReady = false;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" async
        onload="window.__threeReady = true; window.dispatchEvent(new Event('threeready'));"></script>
